name: CI/CD - FastAPI Build & Deploy

on:
  push:
    branches:
      - final

jobs:
  build:
    name: 🛠️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: 🔐 Inject .env from GitHub Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: ✅ Validate secrets are present
        run: |
          MISSING=false

          if [ -z "${{ secrets.POSTGRES_USER }}" ]; then echo "❌ POSTGRES_USER is not set"; MISSING=true; fi
          if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then echo "❌ POSTGRES_PASSWORD is not set"; MISSING=true; fi
          if [ -z "${{ secrets.POSTGRES_DB }}" ]; then echo "❌ POSTGRES_DB is not set"; MISSING=true; fi
          if [ -z "${{ secrets.POSTGRES_PORT }}" ]; then echo "❌ POSTGRES_PORT is not set"; MISSING=true; fi
          if [ -z "${{ secrets.POSTGRES_HOST }}" ]; then echo "❌ POSTGRES_HOST is not set"; MISSING=true; fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then echo "❌ JWT_SECRET is not set"; MISSING=true; fi
          if [ -z "${{ secrets.JWT_EXPIRATION_SECONDS }}" ]; then echo "❌ JWT_EXPIRATION_SECONDS is not set"; MISSING=true; fi
          if [ -z "${{ secrets.USERNAME_GITHUB }}" ]; then echo "❌ USERNAME_GITHUB is not set"; MISSING=true; fi
          if [ -z "${{ secrets.EMAIL_GIT }}" ]; then echo "❌ EMAIL_GIT is not set"; MISSING=true; fi
          if [ -z "${{ secrets.TOKEN_GITHUB }}" ]; then echo "❌ TOKEN_GITHUB is not set"; MISSING=true; fi

          if [ "$MISSING" = true ]; then
            echo "⛔ Missing required secrets. Exiting..."
            exit 1
          else
            echo "✅ All required secrets are present."
          fi

      - name: 🐳 Docker Compose Build & Run
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_SECONDS: ${{ secrets.JWT_EXPIRATION_SECONDS }}
          USERNAME_GITHUB: ${{ secrets.USERNAME_GITHUB }}
          EMAIL_GIT: ${{ secrets.EMAIL_GIT }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: docker-compose up --build -d

      - name: 📦 Show logs for all containers
        run: |
          echo "📦 postgres-db logs:"
          docker logs postgres-db || echo "⚠️ Failed to fetch postgres-db logs"

          echo "📦 fastapi-backend logs:"
          docker logs fastapi-backend || echo "⚠️ Failed to fetch fastapi-backend logs"

          echo "📦 backup logs:"
          docker logs backup || echo "⚠️ Failed to fetch backup logs"

      - name: ⏳ Wait for app to be ready
        run: |
          sleep 10
          docker ps
          curl --fail http://localhost:8000 || (echo "❌ App failed to start" && exit 1)

  deploy:
    name: 🚀 Deploy (Same Runner)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🟢 Confirm deploy step
        run: echo "✅ Build succeeded. App is up. Proceed with real deployment if needed."

