name: CI/CD - FastAPI Build & Deploy

on:
  push:
    branches:
      - backup

jobs:
  build:
    name: 🛠️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: ✅ Validate secrets are present
        run: |
          REQUIRED_SECRETS=(POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB POSTGRES_PORT POSTGRES_HOST JWT_SECRET JWT_EXPIRATION_SECONDS USERNAME_GITHUB EMAIL_GIT TOKEN_GITHUB)
          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${{ secrets[$secret] }}" ]; then
              echo "❌ $secret is NOT set"
              exit 1
            else
              echo "✅ $secret is set"
            fi
          done

      - name: 🐳 Docker Compose Build & Run
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_SECONDS: ${{ secrets.JWT_EXPIRATION_SECONDS }}
          USERNAME_GITHUB: ${{ secrets.USERNAME_GITHUB }}
          EMAIL_GIT: ${{ secrets.EMAIL_GIT }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: docker-compose up --build -d

      - name: 🐘 Show Postgres logs
        if: always()
        run: docker logs postgres-db || true

      - name: ⏳ Wait and verify backend
        run: |
          echo "Waiting 10s for backend to boot..."
          sleep 10
          docker ps
          docker logs fastapi-backend || true
          echo "Testing backend health endpoint"
          curl --fail http://localhost:8000 || (echo "❌ App failed to start" && exit 1)

  deploy:
    name: 🚀 Deploy (Same Runner)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🟢 Confirm deploy step
        run: echo "✅ Build succeeded. App is up. Proceed with real deployment if needed."
