name: CI/CD - FastAPI Build & Deploy

on:
  push:
    branches:
      - backup

jobs:
  build:
    name: 🛠️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: 🔐 Inject .env from GitHub Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: ✅ Check if secrets are passed
        run: |
          if [ -z "${{ secrets.POSTGRES_USER }}" ]; then
            echo "❌ POSTGRES_USER is NOT set"
            exit 1
          else
            echo "✅ POSTGRES_USER is set"
          fi

          if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then
            echo "❌ POSTGRES_PASSWORD is NOT set"
            exit 1
          else
            echo "✅ POSTGRES_PASSWORD is set"
          fi

          if [ -z "${{ secrets.POSTGRES_DB }}" ]; then
            echo "❌ POSTGRES_DB is NOT set"
            exit 1
          else
            echo "✅ POSTGRES_DB is set"
          fi


            - name: 🐳 Docker Compose Up (Build & Run)
              run: docker-compose up --build -d

            - name: 🐘 Show Postgres logs
              if: always()
              run: docker logs postgres-db || true
        

            - name: ✅ Health check (wait then test)
              run: |
                sleep 10
                curl --fail http://localhost || (echo "App failed to start" && exit 1)

            

  deploy:
    name: 🚀 Deploy (Same Runner)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🟢 Confirm deploy step
        run: echo "✅ Build succeeded. App is up. Proceed with real deployment if needed."
