name: CI/CD - FastAPI Build & Deploy

on:
  push:
    branches:
      - final

jobs:
  build:
    name: 🛠️ Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐳 Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: 🔐 Inject .env from GitHub Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: ✅ Validate secrets are present
        run: |
          MISSING=false

          for VAR in POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB POSTGRES_PORT POSTGRES_HOST JWT_SECRET JWT_EXPIRATION_SECONDS USERNAME_GITHUB EMAIL_GIT TOKEN_GITHUB
          do
            if [ -z "${{ secrets[VAR] }}" ]; then
              echo "❌ $VAR is not set"
              MISSING=true
            else
              echo "✅ $VAR is set"
            fi
          done

          if [ "$MISSING" = true ]; then
            echo "⛔ Missing required secrets. Exiting..."
            exit 1
          fi

      - name: 🐳 Docker Compose Build & Run
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_SECONDS: ${{ secrets.JWT_EXPIRATION_SECONDS }}
          USERNAME_GITHUB: ${{ secrets.USERNAME_GITHUB }}
          EMAIL_GIT: ${{ secrets.EMAIL_GIT }}
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
        run: docker-compose up --build -d

      - name: 🧪 Wait for containers to stabilize
        run: sleep 10

      - name: 📦 Show logs for all containers
        run: |
          echo "📦 postgres-db logs:"
          docker logs postgres-db || echo "⚠️ Failed to fetch postgres-db logs"

          echo "📦 fastapi-backend logs:"
          docker logs fastapi-backend || echo "⚠️ Failed to fetch fastapi-backend logs"

          echo "📦 backup logs:"
          docker logs backup || echo "⚠️ Failed to fetch backup logs"

      - name: ✅ Check App Health
        run: |
          docker ps
          echo "⏳ Checking app readiness..."
          curl --fail http://localhost:8000 || (echo "❌ App failed to start" && exit 1)

  deploy:
    name: 🚀 Deploy (Same Runner)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🟢 Confirm deploy step
        run: echo "✅ Build succeeded. App is up. Proceed with deployment if needed."
