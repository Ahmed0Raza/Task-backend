name: CI/CD - FastAPI Build & Deploy

on:
  push:
    branches:
      - Backup

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🔐 Inject .env from GitHub Secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: 🐳 Docker Compose Up (Build + Run)
        run: |
          docker-compose up --build -d

      - name: ✅ Health check (basic)
        run: |
          sleep 10
          curl --fail http://localhost || (echo "App failed to start" && exit 1)

      - name: 🧹 Tear down
        run: docker-compose down
